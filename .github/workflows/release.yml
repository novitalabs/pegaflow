name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        cuda-variant: ['cu12', 'cu13']
        include:
          - cuda-variant: cu12
            cuda-version: '12.8.1'
            cargo-features: ""
          - cuda-variant: cu13
            cuda-version: '13.0.2'
            cargo-features: "--no-default-features --features cuda-13"
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: ${{ matrix.cuda-version }}
          linux-local-args: '["--toolkit"]'
          method: 'network'
          sub-packages: '["nvcc", "nvrtc-dev", "cudart-dev"]'

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Patch package name for cu13
        if: matrix.cuda-variant == 'cu13'
        run: |
          sed -i 's/^name = "pegaflow-llm"$/name = "pegaflow-llm-cu13"/' python/pyproject.toml
          sed -i 's/"pegaflow-llm\[/"pegaflow-llm-cu13\[/g' python/pyproject.toml

      - name: Build wheel
        run: |
          ./scripts/build-wheel.sh --release ${{ matrix.cargo-features }}
          mkdir -p dist
          cp target/wheels/*.whl dist/
        env:
          CUDA_PATH: /usr/local/cuda

      - name: Generate artifact tag
        id: generate_tag
        run: |
          PYTAG=$(echo "py${{ matrix.python-version }}" | tr -d '.')
          echo "artifact_tag=${PYTAG}-${{ matrix.cuda-variant }}" >> $GITHUB_OUTPUT

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pegaflow-wheel-${{ steps.generate_tag.outputs.artifact_tag }}
          path: dist/*.whl

  publish-release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Prepare wheels for release
        run: |
          mkdir -p dist-cu12 dist-cu13 dist-release
          find dist-all -name "pegaflow_llm_cu13-*.whl" -exec cp {} dist-cu13/ \;
          find dist-all -name "pegaflow_llm-*.whl" ! -name "pegaflow_llm_cu13-*" -exec cp {} dist-cu12/ \;
          cp dist-cu12/*.whl dist-cu13/*.whl dist-release/
          echo "Collected wheels:"
          ls -la dist-release/

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*.whl

      - name: Publish pegaflow-llm to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-cu12/
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish pegaflow-llm-cu13 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-cu13/
          password: ${{ secrets.PYPI_API_TOKEN }}
