name: "CI"

on:
  push:
    branches:
      - "master"
      - "main"
  pull_request:
    branches:
      - "master"
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUST_TOOLCHAIN_NIGHTLY: nightly-2025-02-20
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  commit-check:
    name: commit message check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install commitizen
        run: pip install commitizen
      - name: Check last commit message
        run: cz check --rev-range HEAD~1..HEAD

  version-consistency-check:
    name: version consistency check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check Rust and Python package versions stay in sync
        run: |
          python3 - <<'PY'
          import pathlib
          import re

          repo = pathlib.Path.cwd()
          cargo_toml = (repo / "Cargo.toml").read_text(encoding="utf-8")
          pyproject_toml = (repo / "python" / "pyproject.toml").read_text(encoding="utf-8")

          def find_section_version(text: str, section: str) -> str:
              match = re.search(
                  rf"(?ms)^\[{re.escape(section)}\]\n(.*?)(?:^\[|\Z)",
                  text,
              )
              if match is None:
                  raise SystemExit(f"missing section [{section}]")

              version_match = re.search(
                  r'^version = "([^"]+)"$',
                  match.group(1),
                  re.MULTILINE,
              )
              if version_match is None:
                  raise SystemExit(f"missing version in [{section}]")
              return version_match.group(1)

          rust_version = find_section_version(cargo_toml, "workspace.package")
          python_version = find_section_version(pyproject_toml, "project")
          commitizen_version = find_section_version(pyproject_toml, "tool.commitizen")

          if rust_version != python_version or python_version != commitizen_version:
              raise SystemExit(
                  "version mismatch: "
                  f"Cargo.toml={rust_version}, "
                  f"python/pyproject.toml project={python_version}, "
                  f"tool.commitizen={commitizen_version}"
              )

          print(f"version check passed: {rust_version}")
          PY

  typos-check:
    name: typos check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run typos check
        uses: crate-ci/typos@master

  rust-fmt-check:
    name: rust fmt check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - name: Run rust format check
        run: |
          cargo fmt --all -- --check

  rust-clippy-check:
    name: rust clippy check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Run rust clippy check
        run: |
          cargo clippy --workspace --exclude pegaflow-py --all-targets -- -D warnings

  ruff-check:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run ruff check
        uses: astral-sh/ruff-action@v3

  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Run cargo check (core)
        run: |
          cargo check -p pegaflow-core
      - name: Run cargo check (server)
        run: |
          cargo check -p pegaflow-server

  build-wheel:
    name: build Python wheel (${{ matrix.cuda-variant }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        cuda-variant: ['cu12', 'cu13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: '12.8.1'
          linux-local-args: '["--toolkit"]'
          method: 'network'
          sub-packages: '["nvcc", "nvrtc-dev", "cudart-dev"]'

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install maturin
        run: pip install maturin

      - name: Patch package name for cu13
        if: matrix.cuda-variant == 'cu13'
        run: |
          sed -i 's/^name = "pegaflow-llm"$/name = "pegaflow-llm-cu13"/' python/pyproject.toml
          sed -i 's/"pegaflow-llm\[/"pegaflow-llm-cu13\[/g' python/pyproject.toml

      - name: Build wheel
        run: |
          CUDA_FEATURES="${{ matrix.cuda-variant == 'cu13' && '--no-default-features --features cuda-13' || '' }}"
          ./scripts/build-wheel.sh --release $CUDA_FEATURES
        env:
          CUDA_PATH: /usr/local/cuda

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pegaflow-wheel-ci-${{ matrix.cuda-variant }}
          path: target/wheels/*.whl
          retention-days: 1
