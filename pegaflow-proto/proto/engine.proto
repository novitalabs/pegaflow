syntax = "proto3";

package pegaflow;

message ResponseStatus {
  bool ok = 1;
  string message = 2;
}

message RegisterContextRequest {
  string instance_id = 1;
  int32 device_id = 2;
  string layer_name = 3;
  bytes wrapper_bytes = 4;
  uint64 num_blocks = 5;
  uint64 bytes_per_block = 6;
  uint64 kv_stride_bytes = 7;
  uint32 segments = 8;
  uint32 tp_rank = 9;
  uint32 tp_size = 10;
  uint32 num_layers = 11;
  string namespace = 12;
  uint32 world_size = 13;
}

message RegisterContextResponse {
  ResponseStatus status = 1;
}

message SaveLayer {
  string layer_name = 1;
  repeated int32 block_ids = 2;
  repeated bytes block_hashes = 3;
}

message SaveRequest {
  string instance_id = 1;
  uint32 tp_rank = 2;
  int32 device_id = 3;
  repeated SaveLayer saves = 4;
}

message SaveResponse {
  ResponseStatus status = 1;
}

message LoadRequest {
  string instance_id = 1;
  uint32 tp_rank = 2;
  int32 device_id = 3;
  string load_state_shm = 4;
  repeated string layer_names = 5;
  repeated int32 block_ids = 6;
  repeated bytes block_hashes = 7;
}

message LoadResponse {
  ResponseStatus status = 1;
}

message QueryRequest {
  string instance_id = 1;
  repeated bytes block_hashes = 2;
  string req_id = 3;
}

// Prefetch status enum
enum PrefetchState {
  // Terminal: all available blocks ready, proceed with hit_blocks
  PREFETCH_DONE = 0;
  // Transient: blocks being prefetched from DFS, caller should retry
  PREFETCH_LOADING = 1;
}

message QueryResponse {
  ResponseStatus status = 1;
  // Number of blocks ready in cache (for backwards compatibility)
  uint64 hit_blocks = 2;
  // Prefetch state for async prefetch support
  PrefetchState prefetch_state = 3;
  // Number of blocks currently being loaded from DFS
  uint64 loading_blocks = 4;
  // Number of blocks not found in DFS
  uint64 missing_blocks = 5;
}

message UnpinRequest {
  string instance_id = 1;
  repeated bytes block_hashes = 2;
}

message UnpinResponse {
  ResponseStatus status = 1;
}

message UnregisterRequest {
  string instance_id = 1;
}

message UnregisterResponse {
  ResponseStatus status = 1;
}

message ShutdownRequest {}

message ShutdownResponse {
  ResponseStatus status = 1;
}

message HealthRequest {}

message HealthResponse {
  ResponseStatus status = 1;
}

service Engine {
  rpc RegisterContext(RegisterContextRequest) returns (RegisterContextResponse);
  rpc Save(SaveRequest) returns (SaveResponse);
  rpc Load(LoadRequest) returns (LoadResponse);
  // Pure memory-only query: check if prefix blocks are in memory cache (no SSD prefetch)
  rpc Query(QueryRequest) returns (QueryResponse);
  // Prefetch-aware query: check memory + trigger SSD prefetch for missing blocks
  rpc QueryPrefetch(QueryRequest) returns (QueryResponse);
  rpc Unpin(UnpinRequest) returns (UnpinResponse);
  rpc UnregisterContext(UnregisterRequest) returns (UnregisterResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

// MetaServer service for managing block hash keys across multi-node instances
message InsertBlockHashesRequest {
  string namespace = 1;
  repeated bytes block_hashes = 2;
  // The pegaflow-server address that owns these blocks, as ip:port (e.g., "10.0.0.1:50055")
  string node = 3;
  // Per-NUMA RDMA DomainAddress endpoints (26 bytes each).
  // Enables requestors to pre-establish RDMA sessions before AcquireLease.
  repeated bytes domain_addresses = 4;
}

message InsertBlockHashesResponse {
  ResponseStatus status = 1;
  uint64 inserted_count = 2;
}

message QueryBlockHashesRequest {
  string namespace = 1;
  repeated bytes block_hashes = 2;
}

// Block hashes grouped by the owning node
message NodeBlockHashes {
  string node = 1;
  repeated bytes block_hashes = 2;
  // Per-NUMA RDMA DomainAddress endpoints of the owning node.
  repeated bytes domain_addresses = 3;
}

message QueryBlockHashesResponse {
  ResponseStatus status = 1;
  repeated bytes existing_hashes = 2;
  uint64 total_queried = 3;
  uint64 found_count = 4;
  // Found hashes grouped by owning node
  repeated NodeBlockHashes node_blocks = 5;
}

// ============================================================================
// RdmaTransfer: Lease-based RDMA P2P block transfer service
// ============================================================================

// Per-slot memory location for RDMA read (one per TP rank within a block).
message SlotMemory {
  uint64 k_addr = 1;   // Remote virtual address of K segment
  uint64 k_size = 2;
  uint64 v_addr = 3;   // Remote virtual address of V segment
  uint64 v_size = 4;
}

// Describes a single block's remote memory layout for RDMA read.
message RemoteBlockDescriptor {
  bytes block_hash = 1;
  repeated SlotMemory slots = 2;
}

message AcquireLeaseRequest {
  string requester_node_id = 1;  // UUID of requesting node
  string namespace = 2;
  repeated bytes block_hashes = 3;
  uint32 lease_duration_secs = 4; // Requested duration; server may cap
}

message AcquireLeaseResponse {
  string lease_id = 1;
  repeated RemoteBlockDescriptor blocks = 2;
  repeated bytes missing_hashes = 3;
  uint64 expires_at_unix_ms = 4;
  // DomainAddress (26 bytes) of the owner's RDMA transfer engine
  // on the NUMA node where the majority of leased blocks reside.
  bytes owner_domain_address = 5;
}

message RenewLeaseRequest {
  string lease_id = 1;
  string requester_node_id = 2;
  uint32 extend_duration_secs = 3;
}

message RenewLeaseResponse {
  uint64 new_expires_at_unix_ms = 1;
}

message ReleaseLeaseRequest {
  string lease_id = 1;
  string requester_node_id = 2;
}

message ReleaseLeaseResponse {}

service RdmaTransfer {
  // Acquire a time-bounded lease on remote blocks. Pins blocks in memory
  // and returns their virtual addresses for RDMA READ.
  rpc AcquireLease(AcquireLeaseRequest) returns (AcquireLeaseResponse);
  // Extend an existing lease before it expires.
  rpc RenewLease(RenewLeaseRequest) returns (RenewLeaseResponse);
  // Release a lease after RDMA reads complete. Unpins blocks.
  rpc ReleaseLease(ReleaseLeaseRequest) returns (ReleaseLeaseResponse);
}

service MetaServer {
  rpc InsertBlockHashes(InsertBlockHashesRequest) returns (InsertBlockHashesResponse);
  rpc QueryBlockHashes(QueryBlockHashesRequest) returns (QueryBlockHashesResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}
