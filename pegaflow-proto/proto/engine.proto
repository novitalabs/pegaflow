syntax = "proto3";

package pegaflow;

message ResponseStatus {
  bool ok = 1;
  string message = 2;
}

// H2D/D2H transfer backend the engine uses for an instance's GPU worker pools.
enum TransferMode {
  TRANSFER_MODE_DIRECT = 0;
  TRANSFER_MODE_KERNEL = 1;
}

// Batch registration request for all layers on a GPU (reduces N RPCs to 1).
//
// Workers declare only the layers that actually exist on the device; the
// engine derives the instance-wide layer-id space once all `world_size`
// workers have registered. Fields 7 (num_layers) and 16 (layer_ids) carried
// the connector-guessed topology and are retired.
message RegisterContextRequest {
  reserved 7, 16;
  reserved "num_layers", "layer_ids";

  string instance_id = 1;
  string namespace = 2;
  uint32 tp_rank = 3;
  uint32 tp_size = 4;
  uint32 world_size = 5;
  int32 device_id = 6;
  repeated string layer_names = 8;
  repeated bytes wrapper_bytes = 9;
  repeated uint64 num_blocks = 10;
  repeated uint64 bytes_per_block = 11;
  repeated uint64 kv_stride_bytes = 12;
  repeated uint32 segments = 13;
  uint32 pp_rank = 14;
  string client_version = 15;
  // Transfer backend the connector chose for this instance (kernel for MLA,
  // direct otherwise; overridable via pegaflow.transfer_backend). The engine
  // spawns this instance's GPU worker pools with the requested backend.
  TransferMode transfer_mode = 17;
  // Page-first storage: collapse all layers of a block into one contiguous
  // page per tp_rank, so total_slots = tp_size instead of num_layers * tp_size.
  // Set by the connector for MLA; the engine derives per-layer page offsets
  // from the registered layouts. See spec.md.
  bool page_first = 18;
  // Native VMM registration. Each layer is a strided view into one fused,
  // GPU-resident VMM allocation the client exported as a POSIX file descriptor.
  // The fd itself does NOT travel here — it is a host-local kernel object that
  // cannot cross gRPC. The client sends it over the server's fd side-channel
  // (Unix domain socket, SCM_RIGHTS; see HealthResponse.fd_socket_path) keyed
  // by (instance_id, device_id) BEFORE issuing this RPC. Unlike a CUDA IPC
  // handle, a VMM POSIX-fd allocation can be registered into the NIC for
  // GPUDirect RDMA — which is why native clients use VMM, not cuIpcGetMemHandle.
  repeated NativeKvTensor native_kv_tensors = 19;
  // Total byte size of the fused VMM allocation the client exported, already
  // rounded up to the CUDA VMM granularity. The server reserves and maps
  // exactly this size; deriving it from layer extents would not be
  // granularity-aligned and `cuMemAddressReserve` would reject it. Zero for
  // non-native (Python) registrations.
  uint64 native_alloc_size = 20;
}

// One strided layer view into a client's fused VMM allocation. The backing fd
// arrives out-of-band over the fd side-channel; all tensors of one registration
// batch share the single allocation identified by (instance_id, device_id).
message NativeKvTensor {
  uint64 offset_bytes = 1;
  uint64 size_bytes = 2;
  uint64 block_stride_bytes = 3;
}

message RegisterContextResponse {
  ResponseStatus status = 1;
}

message SaveLayer {
  string layer_name = 1;
  repeated uint32 block_ids = 2;
  repeated bytes block_hashes = 3;
}

message SaveRequest {
  string instance_id = 1;
  uint32 tp_rank = 2;
  int32 device_id = 3;
  repeated SaveLayer saves = 4;
  uint32 pp_rank = 5;
}

message SaveResponse {
  ResponseStatus status = 1;
}

message LoadRequest {
  string instance_id = 1;
  uint32 tp_rank = 2;
  int32 device_id = 3;
  string load_state_shm = 4;
  repeated string layer_names = 5;
  repeated LeaseLoad loads = 6;
  bool wait_for_completion = 7;
}

message LeaseLoad {
  bytes lease = 1;
  repeated uint32 block_ids = 2;
}

message LoadResponse {
  ResponseStatus status = 1;
}

message FlushRequest {}

message FlushResponse {
  ResponseStatus status = 1;
}

message QueryRequest {
  string instance_id = 1;
  repeated bytes block_hashes = 2;
  string req_id = 3;
}

message QueryResponse {
  oneof outcome {
    QueryLoading loading = 1;
    QueryReady ready = 2;
  }
}

message QueryLoading {}

message QueryReady {
  uint64 num_hit_blocks = 1;
  bytes lease = 2;
}

message ReleaseRequest {
  bytes lease = 1;
}

message ReleaseResponse {
}

message UnregisterRequest {
  string instance_id = 1;
}

message UnregisterResponse {
  ResponseStatus status = 1;
}

message ShutdownRequest {}

message ShutdownResponse {
  ResponseStatus status = 1;
}

message HealthRequest {}

message HealthResponse {
  ResponseStatus status = 1;
  // Absolute path to the server's fd side-channel (Unix domain socket). Native
  // VMM clients connect here and send their exported allocation fd via
  // SCM_RIGHTS, keyed by (instance_id, device_id), before register_context_batch.
  // Empty if the server has no local fd channel (e.g. Python-only deployments).
  string fd_socket_path = 2;
}

// Liveness session: vllm opens a server-streaming RPC at startup and holds
// it for the lifetime of the instance. Server detects client disconnect
// (process death → TCP FIN) and auto-releases the instance's CUDA IPC
// mappings. Stream events are reserved for future server→client hints.
message SessionRequest {
  string instance_id = 1;
  string namespace   = 2;
  uint32 tp_size     = 3;
  uint32 world_size  = 4;
}

message SessionEvent {
}

// Cross-node transfer: per-slot RDMA metadata
message TransferSlotInfo {
  uint64 k_ptr = 1;      // Remote pinned memory address for K segment
  uint64 k_size = 2;     // Size of the K segment in bytes (per-segment, not total slot size)
  uint64 v_ptr = 3;      // Remote pinned memory address for V segment (0 if contiguous)
  uint64 v_size = 4;     // Size of the V segment in bytes (0 if contiguous)
  uint32 numa_node = 5;  // NUMA node where this slot's memory resides (for RDMA NIC affinity)
}

// Cross-node transfer: per-block RDMA metadata
message TransferBlockInfo {
  bytes block_hash = 1;
  repeated TransferSlotInfo slots = 2;  // One per TP slot
}

message QueryBlocksForTransferRequest {
  string namespace = 1;
  repeated bytes block_hashes = 2;
  string requester_id = 3;             // For lock tracking / logging
}

message QueryBlocksForTransferResponse {
  ResponseStatus status = 1;
  repeated TransferBlockInfo blocks = 2;
  string transfer_session_id = 3;       // Opaque session ID for ReleaseTransferLock
  uint32 lock_timeout_secs = 4;         // Server's transfer lock timeout — client must finish before this
}

// RDMA handshake: establish a new RDMA connection between two peers.
// Caller MUST ensure its own side is not-yet-connected and calls are serialized.
// Server invalidates any stale connection for this requester before creating fresh QPs.
message RdmaHandshakeRequest {
  string requester_id = 1;              // Client's advertise address
  bytes handshake_metadata = 2;         // Client's HandshakeMetadata (bincode-serialized)
}

message RdmaHandshakeResponse {
  ResponseStatus status = 1;
  bytes handshake_metadata = 2;         // Server's HandshakeMetadata (bincode-serialized)
}

message ReleaseTransferLockRequest {
  string transfer_session_id = 1;
}

message ReleaseTransferLockResponse {
  ResponseStatus status = 1;
  uint64 released_blocks = 2;
}

service Engine {
  rpc RegisterContextBatch(RegisterContextRequest) returns (RegisterContextResponse);
  rpc Save(SaveRequest) returns (SaveResponse);
  rpc Load(LoadRequest) returns (LoadResponse);
  rpc Flush(FlushRequest) returns (FlushResponse);
  // Prefetch query: check memory + trigger SSD prefetch or cross-node RDMA fetch for missing blocks
  rpc QueryPrefetch(QueryRequest) returns (QueryResponse);
  rpc Release(ReleaseRequest) returns (ReleaseResponse);
  rpc UnregisterContext(UnregisterRequest) returns (UnregisterResponse);
  // Cross-node transfer: get RDMA metadata for specific blocks (serving side)
  rpc QueryBlocksForTransfer(QueryBlocksForTransferRequest) returns (QueryBlocksForTransferResponse);
  // Cross-node transfer: release block locks after RDMA transfer completes
  rpc ReleaseTransferLock(ReleaseTransferLockRequest) returns (ReleaseTransferLockResponse);
  // RDMA handshake: establish a new peer-to-peer RDMA connection
  rpc RdmaHandshake(RdmaHandshakeRequest) returns (RdmaHandshakeResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  // Liveness channel: server drops the instance's CUDA IPC mappings when
  // this stream closes (vllm process dies or disconnects).
  rpc Session(SessionRequest) returns (stream SessionEvent);
}

// MetaServer service for managing block hash keys across multi-node instances
message InsertBlockHashesRequest {
  string namespace = 1;
  repeated bytes block_hashes = 2;
  // The pegaflow-server address that owns these blocks, as ip:port (e.g., "10.0.0.1:50055")
  string node = 3;
  // Server-generated session id announced by HeartbeatNode.
  string node_id = 4;
}

message InsertBlockHashesResponse {
  ResponseStatus status = 1;
  uint64 inserted_count = 2;
}

message RemoveBlockHashesRequest {
  string namespace = 1;
  repeated bytes block_hashes = 2;
  // Only remove entries whose current owner matches this node address.
  // Prevents races where node A evicts but node B has since re-registered.
  string node = 3;
  // Server-generated session id announced by HeartbeatNode.
  string node_id = 4;
}

message RemoveBlockHashesResponse {
  ResponseStatus status = 1;
  uint64 removed_count = 2;
}

message QueryPrefixBlocksRequest {
  string namespace = 1;
  repeated bytes block_hashes = 2;  // ordered by prefix position
}

message NodePrefixResult {
  string node = 1;
  uint32 prefix_len = 2;
}

message QueryPrefixBlocksResponse {
  repeated NodePrefixResult nodes = 1;
}

message HeartbeatNodeRequest {
  string node = 1;
  string node_id = 2;
}

message HeartbeatNodeResponse {
  uint64 stale_after_secs = 1;
}

message UnregisterNodeRequest {
  string node = 1;
  string node_id = 2;
}

message UnregisterNodeResponse {
  uint64 removed_owners = 1;
}

service MetaServer {
  rpc HeartbeatNode(HeartbeatNodeRequest) returns (HeartbeatNodeResponse);
  rpc UnregisterNode(UnregisterNodeRequest) returns (UnregisterNodeResponse);
  rpc InsertBlockHashes(InsertBlockHashesRequest) returns (InsertBlockHashesResponse);
  rpc RemoveBlockHashes(RemoveBlockHashesRequest) returns (RemoveBlockHashesResponse);
  rpc QueryPrefixBlocks(QueryPrefixBlocksRequest) returns (QueryPrefixBlocksResponse);
}
