[package]
name = "pegaflow-metaserver"
version.workspace = true
edition.workspace = true
default-run = "pegaflow-metaserver"

[lib]
name = "pegaflow_metaserver"
path = "src/lib.rs"

[[bin]]
name = "pegaflow-metaserver"
path = "src/main.rs"

[dependencies]
pegaflow-core.workspace = true
pegaflow-proto = { path = "../pegaflow-proto" }
tonic.workspace = true
tokio.workspace = true
clap.workspace = true
log.workspace = true
logforth.workspace = true
